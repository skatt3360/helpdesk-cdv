<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CDV IT Helpdesk" />
  <meta name="theme-color" content="#0a0c1f" />
  <link rel="manifest" href="/manifest.json" />
  <title>CDV IT Helpdesk Panel</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(r => console.log('✅ SW ready'));
      });
    }
  </script>
</head>
<body>
  <div class="shell" id="appShell">
    <!-- cała reszta HTML jest renderowana przez JS (renderAll() z app.js) – nie musisz nic dodawać -->
  </div>

  <script src="js/app.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
